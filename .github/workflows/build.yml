name: Build Android APK

on:
  repository_dispatch:
    types: [build_apk]

jobs:
  build-apk:
    name: Cloud Android Studio Builder
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: ⚙️ Setup Java JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 🛠️ Setup Gradle
        uses: gradle/gradle-build-action@v3

      - name: 🤖 Generate Android Studio Project
        env:
          APP_NAME: ${{ github.event.client_payload.app_name }}
          APP_ID: ${{ github.event.client_payload.app_id }}
          APP_URL: ${{ github.event.client_payload.app_url }}
        run: |
          python -c "
          import os
          os.makedirs('app/src/main/java/com/aifactory/myapp', exist_ok=True)
          os.makedirs('app/src/main/res/values', exist_ok=True)
          
          with open('settings.gradle', 'w') as f: f.write(\"rootProject.name = 'AI_App'\\ninclude ':app'\\n\")
          
          with open('build.gradle', 'w') as f:
              f.write('''buildscript { repositories { google(); mavenCentral() } dependencies { classpath 'com.android.tools.build:gradle:8.1.1' } }
              allprojects { repositories { google(); mavenCentral() } }''')

          with open('app/build.gradle', 'w') as f:
              f.write('''plugins { id 'com.android.application' }
              android {
                  namespace 'com.aifactory.myapp'
                  compileSdk 34
                  defaultConfig { applicationId 'com.aifactory.myapp'; minSdk 21; targetSdk 34; versionCode 1; versionName '1.0' }
              }''')
              
          with open('app/src/main/AndroidManifest.xml', 'w') as f:
              f.write('''<?xml version=\"1.0\" encoding=\"utf-8\"?>
              <manifest xmlns:android=\"http://schemas.android.com/apk/res/android\">
                  <uses-permission android:name=\"android.permission.INTERNET\" />
                  <application android:allowBackup=\"true\" android:icon=\"@mipmap/ic_launcher\" android:label=\"@string/app_name\" android:theme=\"@android:style/Theme.NoTitleBar\">
                      <activity android:name=\".MainActivity\" android:exported=\"true\">
                          <intent-filter><action android:name=\"android.intent.action.MAIN\" /><category android:name=\"android.intent.category.LAUNCHER\" /></intent-filter>
                      </activity>
                  </application>
              </manifest>''')

          app_url = os.environ.get('APP_URL', 'https://google.com')
          with open('app/src/main/java/com/aifactory/myapp/MainActivity.java', 'w') as f:
              f.write(f'''package com.aifactory.myapp;
              import android.app.Activity; import android.os.Bundle; import android.webkit.WebView; import android.webkit.WebViewClient;
              public class MainActivity extends Activity {{
                  @Override protected void onCreate(Bundle savedInstanceState) {{
                      super.onCreate(savedInstanceState);
                      WebView webView = new WebView(this);
                      webView.getSettings().setJavaScriptEnabled(true);
                      webView.getSettings().setDomStorageEnabled(true);
                      webView.setWebViewClient(new WebViewClient());
                      webView.loadUrl(\"{app_url}\"); 
                      setContentView(webView);
                  }}
              }}''')
          "

      - name: 🏗️ Grant execute permission to gradlew
        run: chmod +x gradlew || true

      - name: 🏗️ Build APK
        run: |
          if [ -f gradlew ]; then
            ./gradlew assembleDebug
          else
            gradle assembleDebug
          fi

      - name: 📦 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Android-App
          path: app/build/outputs/apk/debug/app-debug.apk
