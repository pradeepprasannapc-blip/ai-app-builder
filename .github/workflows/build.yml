name: Build Android APK

on:
  repository_dispatch:
    types: [build_apk]

jobs:
  build:
    name: Cloud Android Studio Builder
    runs-on: ubuntu-latest

    steps:
      # මෙතන @v4 දැම්මම අර Node.js 20 Deprecated කියන Error එක සම්පූර්ණයෙන්ම නැති වෙනවා.
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Process App Data
        run: |
          echo "Building APK for: ${{ github.event.client_payload.app_name }}"
          echo "App ID: ${{ github.event.client_payload.app_id }}"
          echo "Android Target: ${{ github.event.client_payload.android_version }}"
          
      # ඔයාගේ ඇප් එක APK එකක් විදිහට බිල්ඩ් වෙන ප්‍රධාන කමාන්ඩ් එක මෙතනින් ක්‍රියාත්මක වේ.
      - name: Run Build Script
        run: |
          chmod +x ./build.sh || true
          ./build.sh "${{ github.event.client_payload.app_name }}" "${{ github.event.client_payload.app_code }}"
