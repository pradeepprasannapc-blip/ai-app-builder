name: Build Android APK

on:
  repository_dispatch:
    types: [build_apk]

jobs:
  build-apk:
    name: Cloud Android Studio Builder
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: ⚙️ Setup Java JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: 🤖 Generate Android Studio Project
        run: |
          mkdir -p app/src/main/java/com/aifactory/myapp
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/mipmap-xxxhdpi

          cat << 'EOF' > settings.gradle
          rootProject.name = 'AI_App'
          include ':app'
          EOF

          cat << 'EOF' > build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:7.4.2' }
          }
          allprojects {
              repositories { google(); mavenCentral() }
          }
          EOF

          cat << 'EOF' > app/build.gradle
          plugins { id 'com.android.application' }
          android {
              namespace 'com.aifactory.myapp'
              compileSdk 33
              defaultConfig {
                  applicationId 'com.aifactory.myapp'
                  minSdk 21
                  targetSdk 33
                  versionCode 1
                  versionName '1.0'
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_11
                  targetCompatibility JavaVersion.VERSION_11
              }
          }
          EOF

          cat << 'EOF' > app/src/main/AndroidManifest.xml
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET" />
              <application android:allowBackup="true" android:icon="@mipmap/ic_launcher" android:label="@string/app_name" android:theme="@android:style/Theme.NoTitleBar">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter><action android:name="android.intent.action.MAIN" /><category android:name="android.intent.category.LAUNCHER" /></intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          cat << EOF > app/src/main/res/values/strings.xml
          <?xml version="1.0" encoding="utf-8"?>
          <resources><string name="app_name">${{ github.event.client_payload.app_name }}</string></resources>
          EOF

          cat << EOF > app/src/main/java/com/aifactory/myapp/MainActivity.java
          package com.aifactory.myapp;
          import android.app.Activity; import android.os.Bundle; import android.webkit.WebView; import android.webkit.WebViewClient;
          public class MainActivity extends Activity {
              @Override protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  WebView webView = new WebView(this);
                  webView.getSettings().setJavaScriptEnabled(true);
                  webView.getSettings().setDomStorageEnabled(true);
                  webView.setWebViewClient(new WebViewClient());
                  webView.loadUrl("${{ github.event.client_payload.app_url }}"); 
                  setContentView(webView);
              }
          }
          EOF

      - name: 🎨 Download Custom App Icon
        run: |
          if [ "${{ github.event.client_payload.app_icon_url }}" != "" ]; then
            curl -o app/src/main/res/mipmap-xxxhdpi/ic_launcher.png "${{ github.event.client_payload.app_icon_url }}"
          fi

      - name: 🛠️ Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: 🏗️ Build APK
        run: gradle assembleDebug

      - name: 📦 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.client_payload.app_name }}-Android-App
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 5
