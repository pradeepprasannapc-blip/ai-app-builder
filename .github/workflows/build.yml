name: Build Android APK

on:
  repository_dispatch:
    types: [build_apk]

jobs:
  build-apk:
    name: Cloud Android Studio Builder
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: ⚙️ Setup Java JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 🛠️ Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'

      - name: 🤖 Generate Android Studio Project
        env:
          APP_NAME: ${{ github.event.client_payload.app_name }}
          APP_URL: ${{ github.event.client_payload.app_url }}
        run: |
          cat << 'EOF' > generate.py
          import os
          
          app_name = os.environ.get('APP_NAME', 'My AI App').replace('"', '')
          app_url = os.environ.get('APP_URL', 'https://google.com').replace('"', '')
          
          os.makedirs('app/src/main/java/com/aifactory/myapp', exist_ok=True)
          os.makedirs('app/src/main/res/values', exist_ok=True)
          os.makedirs('app/src/main/res/mipmap-xxxhdpi', exist_ok=True)
          
          with open('settings.gradle', 'w') as f:
              f.write("rootProject.name = 'AI_App'\ninclude ':app'\n")
          
          with open('build.gradle', 'w') as f:
              f.write("buildscript { repositories { google(); mavenCentral() } dependencies { classpath 'com.android.tools.build:gradle:8.1.1' } }\nallprojects { repositories { google(); mavenCentral() } }")
          
          with open('app/build.gradle', 'w') as f:
              f.write("plugins { id 'com.android.application' }\nandroid { namespace 'com.aifactory.myapp'; compileSdk 34; defaultConfig { applicationId 'com.aifactory.myapp'; minSdk 24; targetSdk 34; versionCode 1; versionName '1.0' } compileOptions { sourceCompatibility JavaVersion.VERSION_17; targetCompatibility JavaVersion.VERSION_17 } }")
          
          with open('app/src/main/AndroidManifest.xml', 'w') as f:
              f.write('<?xml version="1.0" encoding="utf-8"?>\n<manifest xmlns:android="http://schemas.android.com/apk/res/android">\n<uses-permission android:name="android.permission.INTERNET" />\n<application android:allowBackup="true" android:icon="@mipmap/ic_launcher" android:label="@string/app_name" android:theme="@android:style/Theme.NoTitleBar">\n<activity android:name=".MainActivity" android:exported="true">\n<intent-filter>\n<action android:name="android.intent.action.MAIN" />\n<category android:name="android.intent.category.LAUNCHER" />\n</intent-filter>\n</activity>\n</application>\n</manifest>')
          
          with open('app/src/main/res/values/strings.xml', 'w') as f:
              f.write(f'<?xml version="1.0" encoding="utf-8"?>\n<resources><string name="app_name">{app_name}</string></resources>')
          
          with open('app/src/main/java/com/aifactory/myapp/MainActivity.java', 'w') as f:
              f.write(f'package com.aifactory.myapp;\nimport android.app.Activity;\nimport android.os.Bundle;\nimport android.webkit.WebView;\nimport android.webkit.WebViewClient;\npublic class MainActivity extends Activity {{\n@Override\nprotected void onCreate(Bundle savedInstanceState) {{\nsuper.onCreate(savedInstanceState);\nWebView webView = new WebView(this);\nwebView.getSettings().setJavaScriptEnabled(true);\nwebView.getSettings().setDomStorageEnabled(true);\nwebView.setWebViewClient(new WebViewClient());\nwebView.loadUrl("{app_url}");\nsetContentView(webView);\n}}\n}}')
          
          print("✅ Python generation complete!")
          EOF
          python3 generate.py

      - name: 🎨 Download Custom App Icon
        run: |
          if [ "${{ github.event.client_payload.app_icon_url }}" != "" ]; then
            curl -s -o app/src/main/res/mipmap-xxxhdpi/ic_launcher.png "${{ github.event.client_payload.app_icon_url }}"
          fi

      - name: 🏗️ Build APK
        run: gradle assembleDebug --no-daemon

      - name: 📦 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.client_payload.app_name }}-Android-App
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 5
