name: Build Android APK

on:
  repository_dispatch:
    types: [build_apk]

jobs:
  build-apk:
    name: Cloud Android Studio Builder
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: ⚙️ Setup Java JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 🛠️ Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'

      - name: 🤖 Generate Android Studio Project
        env:
          APP_NAME: ${{ github.event.client_payload.app_name }}
          APP_URL: ${{ github.event.client_payload.app_url }}
        run: |
          cat << 'EOF' > generate.py
          import os
          import json
          import xml.sax.saxutils as saxutils

          app_name = os.environ.get('APP_NAME', 'My AI App')
          app_url = os.environ.get('APP_URL', 'https://google.com')

          safe_app_name = saxutils.escape(app_name).replace("'", "\\'")
          safe_app_url = json.dumps(app_url)

          os.makedirs('app/src/main/java/com/aifactory/myapp', exist_ok=True)
          os.makedirs('app/src/main/res/values', exist_ok=True)
          os.makedirs('app/src/main/res/mipmap-xxxhdpi', exist_ok=True)

          with open('settings.gradle', 'w') as f:
              f.write("pluginManagement { repositories { google(); mavenCentral(); gradlePluginPortal() } }\ndependencyResolutionManagement { repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS); repositories { google(); mavenCentral() } }\nrootProject.name = 'AI_App'\ninclude ':app'\n")

          with open('build.gradle', 'w') as f:
              f.write("plugins { id 'com.android.application' version '8.1.1' apply false }\n")

          with open('app/build.gradle', 'w') as f:
              f.write(f"""plugins {{ id 'com.android.application' }}
          android {{
              namespace 'com.aifactory.myapp'
              compileSdk 34
              defaultConfig {{
                  applicationId 'com.aifactory.myapp'
                  minSdk 24
                  targetSdk 34
                  versionCode 1
                  versionName '1.0'
              }}
              buildTypes {{
                  debug {{ crunchPngs false }}
                  release {{ crunchPngs false }}
              }}
              compileOptions {{
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }}
          }}""")

          with open('app/src/main/AndroidManifest.xml', 'w') as f:
              f.write('<?xml version="1.0" encoding="utf-8"?>\n<manifest xmlns:android="http://schemas.android.com/apk/res/android">\n<uses-permission android:name="android.permission.INTERNET" />\n<application android:allowBackup="true" android:icon="@mipmap/ic_launcher" android:label="@string/app_name" android:theme="@android:style/Theme.NoTitleBar">\n<activity android:name=".MainActivity" android:exported="true">\n<intent-filter>\n<action android:name="android.intent.action.MAIN" />\n<category android:name="android.intent.category.LAUNCHER" />\n</intent-filter>\n</activity>\n</application>\n</manifest>')

          with open('app/src/main/res/values/strings.xml', 'w') as f:
              f.write(f'<?xml version="1.0" encoding="utf-8"?>\n<resources><string name="app_name">{safe_app_name}</string></resources>')

          with open('app/src/main/java/com/aifactory/myapp/MainActivity.java', 'w') as f:
              f.write(f'package com.aifactory.myapp;\nimport android.app.Activity;\nimport android.os.Bundle;\nimport android.webkit.WebView;\nimport android.webkit.WebViewClient;\npublic class MainActivity extends Activity {{\n@Override protected void onCreate(Bundle savedInstanceState) {{\nsuper.onCreate(savedInstanceState);\nWebView webView = new WebView(this);\nwebView.getSettings().setJavaScriptEnabled(true);\nwebView.getSettings().setDomStorageEnabled(true);\nwebView.setWebViewClient(new WebViewClient());\nwebView.loadUrl({safe_app_url});\nsetContentView(webView);\n}}\n}}')
          EOF
          python3 generate.py

      - name: 🎨 Setup App Icon (Custom + Fallback)
        env:
          ICON_URL: ${{ github.event.client_payload.app_icon_url }}
        run: |
          mkdir -p app/src/main/res/mipmap-xxxhdpi
          
          # 1. Safety Net: Create a default valid 1x1 PNG just in case
          echo "iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mP8z8BQDwAEhQGAhKmMIQAAAABJRU5ErkJggg==" | base64 -d > app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
          
          # 2. Download user's custom icon if provided
          if [ "$ICON_URL" != "" ] && [ "$ICON_URL" != "null" ]; then
            echo "Downloading custom icon..."
            curl -s -L -o custom_icon.tmp "$ICON_URL"
            
            # Verify if file is successfully downloaded and not empty
            if [ -s custom_icon.tmp ]; then
              mv custom_icon.tmp app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
              echo "Custom icon applied successfully!"
            else
              echo "Failed to download custom icon. Using default."
            fi
          fi

      - name: 🏗️ Build APK
        run: gradle assembleDebug --no-daemon

      - name: 📦 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.client_payload.app_name }}-Android-App
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 5
