name: Build Android APK

on:
  repository_dispatch:
    types: [build_apk]

jobs:
  build-apk:
    name: Cloud Android Studio Builder
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: ⚙️ Setup Java JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 🤖 Generate Android Studio Project
        env:
          APP_NAME: ${{ github.event.client_payload.app_name }}
          APP_URL: ${{ github.event.client_payload.app_url }}
        run: |
          echo "🚀 Setting up Android project structure..."
          mkdir -p app/src/main/java/com/aifactory/myapp
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/mipmap-xxxhdpi

          cat << 'EOF' > settings.gradle
          pluginManagement {
              repositories { google(); mavenCentral(); gradlePluginPortal() }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories { google(); mavenCentral() }
          }
          rootProject.name = "AI_App"
          include ':app'
          EOF

          cat << 'EOF' > build.gradle
          plugins {
              id 'com.android.application' version '8.1.1' apply false
          }
          EOF

          cat << 'EOF' > app/build.gradle
          plugins { id 'com.android.application' }
          android {
              namespace 'com.aifactory.myapp'
              compileSdk 34
              defaultConfig {
                  applicationId "com.aifactory.myapp"
                  minSdk 24
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
          }
          EOF

          cat << 'EOF' > app/src/main/AndroidManifest.xml
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET" />
              <application android:allowBackup="true" android:icon="@mipmap/ic_launcher" android:label="@string/app_name" android:theme="@android:style/Theme.NoTitleBar">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          # Protect against special characters in App Name breaking the XML
          SAFE_APP_NAME=$(echo "${APP_NAME:-My AI App}" | sed 's/&/&amp;/g; s/</&lt;/g; s/>/&gt;/g')
          cat << EOF > app/src/main/res/values/strings.xml
          <?xml version="1.0" encoding="utf-8"?>
          <resources><string name="app_name">${SAFE_APP_NAME}</string></resources>
          EOF

          cat << EOF > app/src/main/java/com/aifactory/myapp/MainActivity.java
          package com.aifactory.myapp;
          import android.app.Activity; import android.os.Bundle; import android.webkit.WebView; import android.webkit.WebViewClient;
          public class MainActivity extends Activity {
              @Override protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  WebView webView = new WebView(this);
                  webView.getSettings().setJavaScriptEnabled(true);
                  webView.getSettings().setDomStorageEnabled(true);
                  webView.setWebViewClient(new WebViewClient());
                  webView.loadUrl("${APP_URL}");
                  setContentView(webView);
              }
          }
          EOF

      - name: 🎨 Setup App Icon (Fix Missing Icon Error)
        run: |
          # 🚨 මේක තමයි මැජික් එක! Logo එකක් නැත්නම් Default හිස් Icon එකක් හදන්න
          echo "iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mP8z8BQDwAEhQGAhKmMIQAAAABJRU5ErkJggg==" | base64 -d > app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
          
          if [ "${{ github.event.client_payload.app_icon_url }}" != "" ]; then
            curl -s -L -o app/src/main/res/mipmap-xxxhdpi/ic_launcher.png "${{ github.event.client_payload.app_icon_url }}"
          fi

      - name: 🏗️ Build APK
        run: |
          gradle wrapper --gradle-version 8.4
          ./gradlew assembleDebug --no-daemon

      - name: 📦 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.client_payload.app_name }}-Android-App
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 5
